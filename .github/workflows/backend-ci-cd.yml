name: Backend CI/CD

on:
  push:
    branches: [ main ] # Sẽ tự chạy khi bạn push code lên nhánh main
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        # Thay đổi ở đây: Trỏ vào file csproj của API
        run: dotnet restore UrlShortener.Api/UrlShortener.Api.csproj

      - name: Build
        # Thay đổi ở đây: Build project API
        run: dotnet build UrlShortener.Api/UrlShortener.Api.csproj --no-restore -c Release

  # Job 2: Build Docker Image và đẩy lên Docker Hub
  docker-build-push:
    needs: build-and-test # Chỉ chạy nếu Job 1 thành công
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Chỉ đẩy image lên khi push vào main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay ${{ secrets.DOCKERHUB_USERNAME }} bằng thiennn16 trực tiếp
          tags: |
            thiennn16/url-shortener-api:latest
            thiennn16/url-shortener-api:${{ github.sha }}