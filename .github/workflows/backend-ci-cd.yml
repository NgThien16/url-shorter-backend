name: Backend CI/CD

on:
  push:
    branches: [ main ] # Sẽ tự chạy khi bạn push code lên nhánh main
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build và chạy Test (để đảm bảo code không lỗi trước khi build image)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Dùng đúng version .NET 10 của bạn

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

  # Job 2: Build Docker Image và đẩy lên Docker Hub
  docker-build-push:
    needs: build-and-test # Chỉ chạy nếu Job 1 thành công
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Chỉ đẩy image lên khi push vào main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-api:${{ github.sha }}